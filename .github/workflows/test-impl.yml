name: ⚙️ test
on:
  workflow_call:
    inputs:
      pre_commit:
        description: >
          Run pre-commit.
        required: true
        type: string
      unit_tests:
        description: >
          Run unit tests.
        required: true
        type: string
      invocation_tests:
        description: >
          Run invocation tests.
        required: true
        type: string
      integration_tests:
        description: >
          Run integration-like workflow submission tests.
        required: true
        type: string
      unit_test_args:
        description: >
          CLI args to pass verbatim to pytest (unit tests).
        required: false
        type: string
        default: ""
      integration_test_args:
        description: >
          CLI args to pass verbatim to pytest (integration tests).
        required: false
        type: string
        default: ""
      ref:
        required: true
        type: string
        description: >
          Git commit reference.
      head-ref:
        required: false
        type: string
        description: >
          Git HEAD reference (branch name).
      full-repo-name:
        required: true
        type: string
        description: >
          Full repository name.
      executable_name:
        required: true
        type: string
        description: >
          Template parameter.
          Root name of executable.
      pytest_args:
        required: true
        type: string
        description: >
          Template parameter.
          Extra arguments to pass to pytest.
      CLI_path:
        required: true
        type: string
        description: >
          Template parameter.
          Path to CLI implementation script.
      CLI_path_win:
        required: true
        type: string
        description: >
          Template parameter.
          Windows path to CLI implementation script.
      CLI_module:
        required: true
        type: string
        description: >
          Template parameter.
          Python module for CLI implementation.
      app_package:
        required: true
        type: string
        description: >
          Template parameter.
          Python package containing application.
      script-branch:
        required: false
        type: string
        description: Which github-support branch to fetch support scripts from.
        default: main
      python-versions:
        required: false
        type: string
        description: The JSON array of Python versions to test with.
        default: '["3.9", "3.10", "3.11", "3.12", "3.13"]'
      python-integration-versions:
        required: false
        type: string
        description: The JSON array of Python versions to integration test with.
        default: '["3.12"]'
      poetry-version:
        required: false
        type: string
        description: Version of Poetry.
        default: "2.1.3"
      install-timeout-minutes:
        required: false
        type: number
        description: Time to allow for a workflow to install dependencies.
        default: 5
      install-poetry-timeout-minutes:
        required: false
        type: number
        description: Time to allow for a workflow to install poetry.
        default: 5
      unit-test-timeout-minutes:
        required: false
        type: number
        description: Time to allow for a workflow to run unit tests.
        default: 5
      integration-test-timeout-minutes:
        required: false
        type: number
        description: Time to allow for a workflow to run integration tests.
        default: 25
    secrets:
      pre-commit-token:
        required: true
        description: >
          PAT of user who has permission to bypass branch protection,
          or standard GITHUB_TOKEN if running on an external fork

# e.g. don't run simultaneously on the same branch (since we may commit to that branch)
concurrency: ci-${{ inputs.head-ref && format('refs/heads/{0}', inputs.head-ref) || inputs.ref }}

jobs:
  pre-commit:
    permissions:
      # Ensure that this workflow part has permission to write to the PR branch.
      # It might not be able to skip CI checks in all cases, but at least it can write!
      contents: write
    runs-on: ubuntu-latest
    if: inputs.pre_commit == 'true'
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.pre-commit-token }}
          # checkout PR source branch (head_ref) if event is pull_request:
          ref: ${{ inputs.head-ref || inputs.ref }}
          repository: ${{ inputs.full-repo-name }}
          persist-credentials: true
      - name: Configure git for commits
        uses: hpcflow/github-support/configure-git@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
      - name: Set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Run pre-commit
        # avoid exit code 1 (which halts GH actions) from pre-commit run command by
        # running twice:
        run: |
          pip install pre-commit
          pre-commit install
          export SKIP=no-commit-to-branch
          pre-commit run --all-files || pre-commit run --all-files

      - name: pre-commit push changes
        run: |
          if git diff --quiet; then
            echo "No pre-commit changes"
          else
            git commit -am "pre-commit fixes [skip ci]"
            git push
          fi

  cache-app-data:
    permissions:
      # No write permission
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up poetry
        uses: hpcflow/github-support/setup-poetry@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        timeout-minutes: ${{ inputs.install-poetry-timeout-minutes }}
        with:
          version: ${{ inputs.poetry-version }}

      - name: Cache dependencies
        uses: hpcflow/github-support/init-cache@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          name: test
          version: "3.13"

      - name: Install dependencies
        timeout-minutes: ${{ inputs.install-timeout-minutes }}
        run: |
          poetry install --without dev,pyinstaller

      - name: Cache all app data and programs
        run: |
          poetry run python -m "$CLI_MODULE" manage cache-all
        env:
          CLI_MODULE: ${{ inputs.CLI_module }}

      - name: Upload all cached app data/programs
        id: upload-cached-app-data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.executable_name }}-app-data-cache
          path: ~/.cache/${{ inputs.executable_name }}
          retention-days: 1

  test-units:
    needs: [pre-commit, cache-app-data]
    if: inputs.unit_tests == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    permissions:
      # No write permission
      contents: read
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download prepared cached app data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.executable_name }}-app-data-cache
          path: ${{ inputs.executable_name }}-app-data-cache

      - name: Set up poetry
        uses: hpcflow/github-support/setup-poetry@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        timeout-minutes: ${{ inputs.install-poetry-timeout-minutes }}
        with:
          version: ${{ inputs.poetry-version }}
      - name: Cache dependencies
        uses: hpcflow/github-support/init-cache@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          name: test
          version: ${{ matrix.python-version }}

      - name: Install dependencies
        timeout-minutes: ${{ inputs.install-timeout-minutes }}
        run: |
          poetry install --without dev,pyinstaller

      - name: Install cached app data
        env:
          PYTHONUTF8: 1
          EXE_NAME: ${{ inputs.executable_name }}
        run: |
          poetry run "$EXE_NAME" data install-cache "${EXE_NAME}-app-data-cache/data"
          poetry run "$EXE_NAME" data --list
          poetry run "$EXE_NAME" program install-cache "${EXE_NAME}-app-data-cache/programs"
          poetry run "$EXE_NAME" program --list

      - name: Run tests
        timeout-minutes: ${{ inputs.unit-test-timeout-minutes }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: ok
          EXE_NAME: ${{ inputs.executable_name }}
          PYTEST_ARGS: ${{ inputs.pytest_args }}
          UT_ARGS: ${{ inputs.unit_test_args }}
        run: |
          poetry run "$EXE_NAME" test $PYTEST_ARGS $UT_ARGS

  test-units-RockyLinux:
    needs: [pre-commit, cache-app-data]
    runs-on: ubuntu-latest
    if: inputs.unit_tests == 'true'
    permissions:
      # No write permission
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Cache dependencies
        uses: hpcflow/github-support/init-cache@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          name: test
          version: RockyLinux

      - name: Download prepared cached app data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.executable_name }}-app-data-cache
          path: ${{ inputs.executable_name }}-app-data-cache

      - name: Run unit tests within Docker
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185 # v3
        with:
          image: ghcr.io/hpcflow/rockylinux8-python:latest
          options: |
            -v ${{ github.workspace }}:/home
            --env GH_TOKEN --env EXE_NAME --env UT_ARGS
          run: |
            cd /home
            poetry config virtualenvs.in-project true
            poetry install --without dev,pyinstaller
            poetry run "$EXE_NAME" data install-cache "${EXE_NAME}-app-data-cache/data"
            poetry run "$EXE_NAME" program install-cache "${EXE_NAME}-app-data-cache/programs"
            poetry run "$EXE_NAME" data --list
            poetry run "$EXE_NAME" program --list
            export PYTHONUNBUFFERED=ok
            poetry run "$EXE_NAME" test $UT_ARGS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXE_NAME: ${{ inputs.executable_name }}
          UT_ARGS: ${{ inputs.unit_test_args }}
        timeout-minutes: ${{ inputs.unit-test-timeout-minutes }}

  test-integration:
    needs: [pre-commit, cache-app-data]
    if: inputs.integration_tests == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-integration-versions) }}
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    permissions:
      # No write permission
      contents: read
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up poetry
        uses: hpcflow/github-support/setup-poetry@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        timeout-minutes: ${{ inputs.install-poetry-timeout-minutes }}
        with:
          version: ${{ inputs.poetry-version }}
      - name: Cache dependencies
        uses: hpcflow/github-support/init-cache@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          name: test-integration
          version: ${{ matrix.python-version }}

      - name: Download prepared cached app data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.executable_name }}-app-data-cache
          path: ${{ inputs.executable_name }}-app-data-cache

      - name: Install dependencies
        timeout-minutes: ${{ inputs.install-timeout-minutes }}
        run: |
          poetry install --without dev,pyinstaller

      - name: Install cached app data
        env:
          PYTHONUTF8: 1
          EXE_NAME: ${{ inputs.executable_name }}
        run: |
          poetry run "$EXE_NAME" data install-cache "${EXE_NAME}-app-data-cache/data"
          poetry run "$EXE_NAME" data --list
          poetry run "$EXE_NAME" program install-cache "${EXE_NAME}-app-data-cache/programs"
          poetry run "$EXE_NAME" program --list

      - name: Run integration tests
        timeout-minutes: ${{ inputs.integration-test-timeout-minutes }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUNBUFFERED: ok
          EXE_NAME: ${{ inputs.executable_name }}
          PYTEST_ARGS: ${{ inputs.pytest_args }}
          IT_ARGS: ${{ inputs.integration_test_args }}
        run: |
          poetry run "$EXE_NAME" test $PYTEST_ARGS --integration $IT_ARGS

  test-integration-RockyLinux:
    needs: [pre-commit, cache-app-data]
    runs-on: ubuntu-latest
    if: inputs.integration_tests == 'true'
    permissions:
      # No write permission
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Cache dependencies
        uses: hpcflow/github-support/init-cache@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          name: test-integration
          version: RockyLinux

      - name: Download prepared cached app data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.executable_name }}-app-data-cache
          path: ${{ inputs.executable_name }}-app-data-cache

      - name: Run integration tests within Docker
        uses: addnab/docker-run-action@4f65fabd2431ebc8d299f8e5a018d79a769ae185 # v3
        with:
          image: ghcr.io/hpcflow/rockylinux8-python:latest
          options: |
            -v ${{ github.workspace }}:/home
            --env GH_TOKEN --env EXE_NAME --env IT_ARGS
          run: |
            cd /home
            poetry config virtualenvs.in-project true
            poetry install --without dev,pyinstaller
            poetry run "$EXE_NAME" data install-cache "${EXE_NAME}-app-data-cache/data"
            poetry run "$EXE_NAME" program install-cache "${EXE_NAME}-app-data-cache/programs"
            poetry run "$EXE_NAME" data --list
            poetry run "$EXE_NAME" program --list
            export PYTHONUNBUFFERED=ok
            poetry run "$EXE_NAME" test --integration $IT_ARGS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXE_NAME: ${{ inputs.executable_name }}
          IT_ARGS: ${{ inputs.integration_test_args }}
        timeout-minutes: ${{ inputs.integration-test-timeout-minutes }}

  test-invocation-ubuntu:
    if: inputs.invocation_tests == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-integration-versions) }}
    permissions:
      # No write permission
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Checkout supporting test infrastructure
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: hpcflow/github-support
          path: github-support
          ref: ${{ inputs.script-branch }}
          persist-credentials: false
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up poetry
        uses: hpcflow/github-support/setup-poetry@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        id: poetry
        timeout-minutes: ${{ inputs.install-poetry-timeout-minutes }}
        with:
          version: ${{ inputs.poetry-version }}
      - name: Cache dependencies
        uses: hpcflow/github-support/init-cache@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          name: test-invocation
          version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          poetry install --without dev,pyinstaller
          poetry run pip install ipython
        timeout-minutes: ${{ inputs.install-timeout-minutes }}

      - name: Prepare test data
        id: prep-test-data
        run: |
          echo "exe-path=${PY//python/$EXE_NAME}" >> $GITHUB_OUTPUT
          mkdir papermill_out
        env:
          EXE_NAME: ${{ inputs.executable_name }}
          PY: ${{ steps.poetry.outputs.python-path }}

      - name: Test invocation command with `python ./${{ inputs.CLI_path }}`
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: source "$POETRY_PATH/bin/activate"
          command: python "./${CLI_PATH}" internal get-invoc-cmd
          expected: "('${{ steps.poetry.outputs.python-path }}', '${{ github.workspace }}/${{ inputs.CLI_path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          CLI_PATH: ${{ inputs.CLI_path }}

      - name: Test invocation command with `python -m ${{ inputs.CLI_module }}`
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: source "$POETRY_PATH/bin/activate"
          command: python -m "$CLI_MODULE" internal get-invoc-cmd
          expected: "('${{ steps.poetry.outputs.python-path }}', '${{ github.workspace }}/${{ inputs.CLI_path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          CLI_MODULE: ${{ inputs.CLI_module }}

      - name: Test invocation command with `${{ inputs.executable_name }}` entry point script
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: source "$POETRY_PATH/bin/activate"
          command: |
            "$EXE_NAME" internal get-invoc-cmd
          expected: "('${{ steps.poetry.outputs.python-path }}', '${{ steps.prep-test-data.outputs.exe-path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          EXE_NAME: ${{ inputs.executable_name }}

      - name: Test invocation command within a python script
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: source "$POETRY_PATH/bin/activate"
          command: python github-support/scripts/get_invoc_cmd.py "$APP_PKG"
          expected: "('${{ steps.poetry.outputs.python-path }}', '${{ github.workspace }}/${{ inputs.CLI_path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          APP_PKG: ${{ inputs.app_package }}

      - name: Test invocation command with interactive python
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: source "$POETRY_PATH/bin/activate"
          command: python github-support/scripts/get_invoc_cmd_interactive.py python "$APP_PKG"
          expected: "('${{ steps.poetry.outputs.python-path }}', '${{ github.workspace }}/${{ inputs.CLI_path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          APP_PKG: ${{ inputs.app_package }}

      - name: Test invocation command with interactive ipython
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: source "$POETRY_PATH/bin/activate"
          command: python github-support/scripts/get_invoc_cmd_interactive.py ipython "$APP_PKG"
          expected: "('${{ steps.poetry.outputs.python-path }}', '${{ github.workspace }}/${{ inputs.CLI_path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          APP_PKG: ${{ inputs.app_package }}

      - name: Test direct workflow submission within a python script
        run: |
          source "$POETRY_PATH/bin/activate"
          python github-support/scripts/test_direct_sub_python_script.py "$APP_PKG"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          APP_PKG: ${{ inputs.app_package }}

      - name: Test direct workflow submission within a Jupyter notebook (via papermill)
        run: |
          source "$POETRY_PATH/bin/activate"
          python -m ipykernel install --user --name python3
          papermill github-support/scripts/test_direct_sub_jupyter_notebook.ipynb "papermill_out/test_direct_sub_jupyter_notebook_${PY_VER}_${RUNNER_OS}.ipynb" -p app_import_str "$APP_PKG"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          APP_PKG: ${{ inputs.app_package }}
          PY_VER: ${{ matrix.python-version }}

  test-invocation-macos:
    if: inputs.invocation_tests == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-integration-versions) }}
    permissions:
      # No write permission
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Checkout supporting test infrastructure
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: hpcflow/github-support
          path: github-support
          ref: ${{ inputs.script-branch }}
          persist-credentials: false
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up poetry
        uses: hpcflow/github-support/setup-poetry@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        id: poetry
        timeout-minutes: ${{ inputs.install-poetry-timeout-minutes }}
        with:
          version: ${{ inputs.poetry-version }}
      - name: Cache dependencies
        uses: hpcflow/github-support/init-cache@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          name: test-invocation
          version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          poetry install --without dev,pyinstaller
          poetry run pip install ipython
        timeout-minutes: ${{ inputs.install-timeout-minutes }}

      - name: Prepare test data
        id: prep-test-data
        run: |
          echo "exe-path=${PY//python/$EXE_NAME}" >> $GITHUB_OUTPUT
          mkdir papermill_out
        env:
          EXE_NAME: ${{ inputs.executable_name }}
          PY: ${{ steps.poetry.outputs.python-path }}

      - name: Test invocation command with `python ./${{ inputs.CLI_path }}`
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: source "$POETRY_PATH/bin/activate"
          command: python "./${CLI_PATH}" internal get-invoc-cmd
          expected: "('${{ steps.poetry.outputs.python-path }}', '${{ github.workspace }}/${{ inputs.CLI_path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          CLI_PATH: ${{ inputs.CLI_path }}

      - name: Test invocation command with `python -m ${{ inputs.CLI_module }}`
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: source "$POETRY_PATH/bin/activate"
          command: python -m "$CLI_MODULE" internal get-invoc-cmd
          expected: "('${{ steps.poetry.outputs.python-path }}', '${{ github.workspace }}/${{ inputs.CLI_path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          CLI_MODULE: ${{ inputs.CLI_module }}

      - name: Test invocation command with `${{ inputs.executable_name }}` entry point script
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: source "$POETRY_PATH/bin/activate"
          command: |
            "$EXE_NAME" internal get-invoc-cmd
          expected: "('${{ steps.poetry.outputs.python-path }}', '${{ steps.prep-test-data.outputs.exe-path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          EXE_NAME: ${{ inputs.executable_name }}

      - name: Test invocation command within a python script
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: source "$POETRY_PATH/bin/activate"
          command: python github-support/scripts/get_invoc_cmd.py "$APP_PKG"
          expected: "('${{ steps.poetry.outputs.python-path }}', '${{ github.workspace }}/${{ inputs.CLI_path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          APP_PKG: ${{ inputs.app_package }}

      - name: Test invocation command with interactive python
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: source "$POETRY_PATH/bin/activate"
          command: python github-support/scripts/get_invoc_cmd_interactive.py python "$APP_PKG"
          expected: "('${{ steps.poetry.outputs.python-path }}', '${{ github.workspace }}/${{ inputs.CLI_path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          APP_PKG: ${{ inputs.app_package }}

      - name: Test invocation command with interactive ipython
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: source "$POETRY_PATH/bin/activate"
          command: python github-support/scripts/get_invoc_cmd_interactive.py ipython "$APP_PKG"
          expected: "('${{ steps.poetry.outputs.python-path }}', '${{ github.workspace }}/${{ inputs.CLI_path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          APP_PKG: ${{ inputs.app_package }}

      - name: Test direct workflow submission within a python script
        run: |
          source "$POETRY_PATH/bin/activate"
          python github-support/scripts/test_direct_sub_python_script.py "$APP_PKG"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          APP_PKG: ${{ inputs.app_package }}

      - name: Test direct workflow submission within a Jupyter notebook (via papermill)
        run: |
          source "$POETRY_PATH/bin/activate"
          python -m ipykernel install --user --name python3
          papermill github-support/scripts/test_direct_sub_jupyter_notebook.ipynb "papermill_out/test_direct_sub_jupyter_notebook_${PY_VER}_${RUNNER_OS}.ipynb" -p app_import_str "$APP_PKG"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          APP_PKG: ${{ inputs.app_package }}
          PY_VER: ${{ matrix.python-version }}

  test-invocation-windows:
    if: inputs.invocation_tests == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-integration-versions) }}
    permissions:
      # No write permission
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Checkout supporting test infrastructure
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: hpcflow/github-support
          path: github-support
          ref: ${{ inputs.script-branch }}
          persist-credentials: false
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up poetry
        uses: hpcflow/github-support/setup-poetry@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        id: poetry
        timeout-minutes: ${{ inputs.install-poetry-timeout-minutes }}
        with:
          version: ${{ inputs.poetry-version }}
      - name: Cache dependencies
        uses: hpcflow/github-support/init-cache@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          name: test-invocation
          version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          poetry install --without dev,pyinstaller
        timeout-minutes: ${{ inputs.install-timeout-minutes }}

      - name: Prepare test data
        id: prep-test-data
        run: |
          ("python-path=" + $Env:PY.Replace('\', '\\')) | Out-File $Env:GITHUB_OUTPUT -Append
          ("cli-path=$Env:GITHUB_WORKSPACE\$Env:CLI_PATH".Replace('\', '\\')) | Out-File $Env:GITHUB_OUTPUT -Append
          ("exe-path=$Env:PY".Replace('python.exe', $Env:EXE_NAME).Replace('\', '\\')) | Out-File $Env:GITHUB_OUTPUT -Append
          New-Item -ItemType Directory -Path papermill_out
        env:
          CLI_PATH: ${{ inputs.CLI_path_win }}
          EXE_NAME: ${{ inputs.executable_name }}
          PY: ${{ steps.poetry.outputs.python-path }}

      - name: Test invocation command with `python ./${{ inputs.CLI_path }}`
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: ."$Env:POETRY_PATH\Scripts\activate.ps1"
          command: python "./$Env:CLI_PATH" internal get-invoc-cmd
          expected: "('${{ steps.prep-test-data.outputs.python-path }}', '${{ steps.prep-test-data.outputs.cli-path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          CLI_PATH: ${{ inputs.CLI_path }}

      - name: Test invocation command with `python -m ${{ inputs.CLI_module }}`
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: ."$Env:POETRY_PATH\Scripts\activate.ps1"
          command: python -m "$Env:CLI_MODULE" internal get-invoc-cmd
          expected: "('${{ steps.prep-test-data.outputs.python-path }}', '${{ steps.prep-test-data.outputs.cli-path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          CLI_MODULE: ${{ inputs.CLI_module }}

      - name: Test invocation command with `${{ inputs.executable_name }}` entry point script
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: ."$Env:POETRY_PATH\Scripts\activate.ps1"
          command: |
            "$Env:EXE_NAME" internal get-invoc-cmd
          expected: "('${{ steps.prep-test-data.outputs.python-path }}', '${{ steps.prep-test-data.outputs.exe-path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          EXE_NAME: ${{ inputs.executable_name }}

      - name: Test invocation command within a python script
        uses: hpcflow/github-support/compare@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          init: ."$Env:POETRY_PATH\Scripts\activate.ps1"
          command: python github-support\scripts\get_invoc_cmd.py "$Env:APP_PKG"
          expected: "('${{ steps.prep-test-data.outputs.python-path }}', '${{ steps.prep-test-data.outputs.cli-path }}')"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          APP_PKG: ${{ inputs.app_package }}

      - name: Test direct workflow submission within a python script
        run: |
          ."$Env:POETRY_PATH\Scripts\activate.ps1"
          python github-support\scripts\test_direct_sub_python_script.py "$Env:APP_PKG"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          APP_PKG: ${{ inputs.app_package }}

      - name: Test direct workflow submission within a Jupyter notebook (via papermill)
        run: |
          ."$Env:POETRY_PATH\Scripts\activate.ps1"
          python -m ipykernel install --user --name python3
          papermill github-support\scripts\test_direct_sub_jupyter_notebook.ipynb "papermill_out\test_direct_sub_jupyter_notebook_$($Env:PY_VER)_$($Env:RUNNER_OS).ipynb" -p app_import_str "$Env:APP_PKG"
        env:
          POETRY_PATH: ${{ steps.poetry.outputs.poetry-path }}
          APP_PKG: ${{ inputs.app_package }}
          PY_VER: ${{ matrix.python-version }}

  cleanup-cache:
    needs:
      - test-units
      - test-units-RockyLinux
      - test-integration
      - test-integration-RockyLinux
    runs-on: ubuntu-latest
    steps:
      - name: Delete cache artifact
        uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118 # v6.0.0
        with:
          name: "*-app-data-cache"
          failOnError: false
