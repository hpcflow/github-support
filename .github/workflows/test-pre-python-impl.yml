name: ⚙️ Test pre-python

on:
  workflow_call:
    inputs:
      ref:
        description: Git commit reference.
        required: true
        type: string
      head-ref:
        description: Git HEAD commit reference (branch name).
        required: false
        type: string
        default: ""
      pytest-args:
        description: >
          Template parameter.
          Extra arguments to pass to pytest.
        required: true
        type: string
      python-versions:
        required: false
        type: string
        description: The JSON array of Python versions to test with.
        default: '["3.13-dev"]'
      poetry-version:
        required: false
        type: string
        description: Version of Poetry.
        default: "2.1.3"

# Don't run simultaneously on the same branch (since we may commit to that branch)
concurrency: ci-${{ inputs.head-ref && format('refs/heads/{0}', inputs.head-ref) || inputs.ref }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Cache dependencies
        uses: hpcflow/github-support/init-cache@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          name: test
          version: ${{ matrix.python-version }}
      - name: Set up poetry
        uses: hpcflow/github-support/setup-poetry@86e0cf45f9f79069d0bc1b8a727c097a03d9012e # 0.5
        with:
          version: ${{ inputs.poetry-version }}

      - name: Install dependencies
        run: |
          poetry install --without dev,pyinstaller

      - name: Run tests
        run: |
          poetry run python -m pytest $ARGUMENTS
        env:
          PYTHONUNBUFFERED: ok
          ARGUMENTS: ${{ inputs.pytest-args }}
